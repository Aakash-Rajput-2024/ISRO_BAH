[pytest]
testpaths = validations/tests
addopts = -q
filterwarnings =
    ignore:.*scipy.ndimage.interpolation.*:DeprecationWarning
markers =
    fast: quick regression checks (< ~10 s total); run on every push
    slow: Monte-Carlo characterisation; run nightly
    crossval: requires an independent library (aotools / hcipy); skipped if absent
    hardware: requires real lab-data fixtures; skipped if absent
    golden: C-port oracle conformance against stored golden vectors
    ml: deep-learning (Method 3) checks; requires torch, skipped if absent
